<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title description">
  <title id="title">Academic Literature RAG System Architecture</title>
  <desc id="description">Offline Docling ingestion creates dense BGE-base embeddings in Qdrant. Online queries use four-turn memory, dense retrieval plus text-match candidates, cross-encoder reranking, neighboring chunk expansion, and a configurable LLM.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#475569"/></marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .group { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .group-title { font: 700 23px Arial, sans-serif; fill: #1e293b; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 12; }
      .node-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 12; }
      .node-amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; rx: 12; }
      .node-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; rx: 12; }
      .node-title { font: 700 17px Arial, sans-serif; fill: #172554; text-anchor: middle; }
      .node-body { font: 14px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .label { font: 13px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <text x="70" y="58" class="title">Academic Literature RAG System</text>
  <text x="70" y="88" class="subtitle">Implementation-aligned architecture: structure-aware ingestion, dense retrieval, reranking, context expansion, and configurable generation.</text>

  <rect x="50" y="125" width="1700" height="320" class="group"/>
  <text x="80" y="165" class="group-title">Offline ingestion pipeline</text>

  <rect x="85" y="225" width="170" height="100" class="node"/>
  <text x="170" y="265" class="node-title">Academic PDFs</text>
  <text x="170" y="290" class="node-body">Five source papers</text>

  <rect x="305" y="225" width="190" height="100" class="node"/>
  <text x="400" y="260" class="node-title">Docling parsing</text>
  <text x="400" y="286" class="node-body">Layout, tables, formulas,</text><text x="400" y="306" class="node-body">and reading order</text>

  <rect x="545" y="225" width="190" height="100" class="node"/>
  <text x="640" y="260" class="node-title">Document cleaning</text>
  <text x="640" y="286" class="node-body">Remove headers, footers,</text><text x="640" y="306" class="node-body">and boilerplate</text>

  <rect x="785" y="225" width="205" height="100" class="node"/>
  <text x="887" y="260" class="node-title">Docling HybridChunker</text>
  <text x="887" y="286" class="node-body">Heading-aware, token-safe</text><text x="887" y="306" class="node-body">chunks, max 500 tokens</text>

  <rect x="1040" y="225" width="210" height="100" class="node"/>
  <text x="1145" y="260" class="node-title">Metadata enrichment</text>
  <text x="1145" y="286" class="node-body">Paper, section, page,</text><text x="1145" y="306" class="node-body">and chunk number</text>

  <rect x="1300" y="225" width="205" height="100" class="node-blue"/>
  <text x="1402" y="260" class="node-title">BGE-base encoding</text>
  <text x="1402" y="286" class="node-body">BAAI/bge-base-en-v1.5</text><text x="1402" y="306" class="node-body">768D dense embeddings</text>

  <rect x="1560" y="205" width="135" height="140" class="node-blue"/>
  <text x="1627" y="250" class="node-title">Qdrant</text>
  <text x="1627" y="276" class="node-body">Persistent local</text><text x="1627" y="296" class="node-body">dense-vector index</text>

  <path d="M255 275 H305" class="arrow"/><path d="M495 275 H545" class="arrow"/><path d="M735 275 H785" class="arrow"/>
  <path d="M990 275 H1040" class="arrow"/><path d="M1250 275 H1300" class="arrow"/><path d="M1505 275 H1560" class="arrow"/>

  <rect x="50" y="500" width="1700" height="470" class="group"/>
  <text x="80" y="540" class="group-title">Online query and answer pipeline</text>

  <rect x="85" y="650" width="150" height="95" class="node-amber"/>
  <text x="160" y="687" class="node-title">User query</text><text x="160" y="712" class="node-body">Question or prompt</text>

  <rect x="290" y="650" width="205" height="95" class="node"/>
  <text x="392" y="684" class="node-title">Conversation memory</text><text x="392" y="710" class="node-body">Latest 4 complete</text><text x="392" y="730" class="node-body">user/assistant turns</text>

  <rect x="550" y="650" width="180" height="95" class="node"/>
  <text x="640" y="685" class="node-title">Query router</text><text x="640" y="710" class="node-body">Greeting/off-topic or</text><text x="640" y="730" class="node-body">retrieval decision</text>

  <rect x="785" y="590" width="190" height="90" class="node-blue"/>
  <text x="880" y="624" class="node-title">Dense retrieval</text><text x="880" y="650" class="node-body">Cosine similarity</text>

  <rect x="785" y="780" width="190" height="90" class="node-blue"/>
  <text x="880" y="814" class="node-title">Text-match filter</text><text x="880" y="840" class="node-body">Qdrant candidate lookup</text>

  <rect x="1030" y="650" width="185" height="95" class="node"/>
  <text x="1122" y="685" class="node-title">Candidate merge</text><text x="1122" y="710" class="node-body">Deduplicate dense and</text><text x="1122" y="730" class="node-body">text-match candidates</text>

  <rect x="1270" y="650" width="190" height="95" class="node"/>
  <text x="1365" y="685" class="node-title">Cross-encoder rerank</text><text x="1365" y="710" class="node-body">ms-marco MiniLM</text><text x="1365" y="730" class="node-body">Top 10 candidates</text>

  <rect x="1515" y="650" width="185" height="95" class="node"/>
  <text x="1607" y="685" class="node-title">Context expansion</text><text x="1607" y="710" class="node-body">Same paper, chunk</text><text x="1607" y="730" class="node-body">number N-1 and N+1</text>

  <rect x="1270" y="840" width="240" height="95" class="node-green"/>
  <text x="1390" y="874" class="node-title">Configurable LLM</text><text x="1390" y="900" class="node-body">Ollama, Groq, Google, or OpenAI</text><text x="1390" y="920" class="node-body">Grounded answer synthesis</text>

  <rect x="1570" y="840" width="130" height="95" class="node-amber"/>
  <text x="1635" y="878" class="node-title">Grounded</text><text x="1635" y="900" class="node-title">response</text>

  <path d="M235 697 H290" class="arrow"/><path d="M495 697 H550" class="arrow"/>
  <path d="M730 697 H755 V635 H785" class="arrow"/><path d="M730 697 H755 V825 H785" class="arrow"/>
  <path d="M975 635 H1000 V697 H1030" class="arrow"/><path d="M975 825 H1000 V697" class="arrow"/>
  <path d="M1215 697 H1270" class="arrow"/><path d="M1460 697 H1515" class="arrow"/>
  <path d="M1607 745 V790 H1390 V840" class="arrow"/><path d="M1510 887 H1570" class="arrow"/>
  <path d="M495 745 V790 H1390 V840" class="arrow"/>
  <path d="M1627 345 V520 H880 V590" class="dash"/><path d="M1627 345 V520 H1607 V650" class="dash"/>
  <text x="1050" y="505" class="label">Qdrant supplies stored chunks and metadata</text>
</svg>
